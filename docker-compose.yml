services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: verikey
      POSTGRES_USER: verikey
      POSTGRES_PASSWORD: verikey_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./db/migrations/002_extend_expiry.sql:/docker-entrypoint-initdb.d/002_extend_expiry.sql
      - ./db/migrations/003_email_otp_redesign.sql:/docker-entrypoint-initdb.d/003_email_otp_redesign.sql
      - ./db/migrations/004_cleanup_triggers_and_encrypt_email.sql:/docker-entrypoint-initdb.d/004_cleanup_triggers_and_encrypt_email.sql
      - ./db/migrations/005_recipient_email_encrypted_and_account_ops.sql:/docker-entrypoint-initdb.d/005_recipient_email_encrypted_and_account_ops.sql
      - ./db/migrations/006_recipient_answer.sql:/docker-entrypoint-initdb.d/006_recipient_answer.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verikey"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://verikey:verikey_secret@db:5432/verikey
      NEXT_PUBLIC_BASE_URL: http://localhost:3000
      WEBAUTHN_RP_ID: localhost
      WEBAUTHN_RP_NAME: VeriKey
      CHALLENGE_SECRET: change_this_to_a_random_64_char_hex_string
      IDENTIFIER_HMAC_SECRET: change_this_to_a_random_64_char_hex_string
      EMAIL_ENCRYPTION_KEY: change_this_to_a_random_64_char_hex_string
      RESEND_API_KEY: ""
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
